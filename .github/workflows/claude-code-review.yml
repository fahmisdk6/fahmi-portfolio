name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          review_comment: true
          prompt: |
            Review the PR diff for code quality, security issues, bugs, and best practice violations.
            Focus on actionable feedback. Flag any hardcoded credentials, type safety issues,
            use of var instead of const/let, unused variables, and potential security vulnerabilities.
            Be concise and specific in your comments.
