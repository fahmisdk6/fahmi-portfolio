name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: true
          prompt: |
            You are a code reviewer. Review the changes in this pull request.
            Read each changed file and provide your feedback as a PR review comment.
            Post your review using: gh pr review ${{ github.event.pull_request.number }} --comment --body "your review here"
          claude_args: '--allowedTools "Bash(git diff:*)" --allowedTools "Bash(cat:*)" --allowedTools "Bash(gh pr:*)" --allowedTools "Read"'
